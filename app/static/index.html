<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveLink 3D | Enterprise Wave Forecasting</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root {
            --neon-teal: #00f2ff;
            --deep-ocean: #050a15;
            --glass-bg: rgba(10, 25, 47, 0.7);
            --glass-border: rgba(0, 242, 255, 0.2);
            --text-glow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--deep-ocean);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .overlay {
            position: relative;
            z-index: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navbar & Sound */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-teal), #70ffeb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--text-glow);
        }

        .sound-toggle {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            color: var(--neon-teal);
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .sound-toggle:hover {
            box-shadow: 0 0 15px var(--neon-teal);
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 5rem;
            opacity: 0;
            transform: translateY(30px);
        }

        .hero h1 {
            font-size: 4.5rem;
            line-height: 1;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Main Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--neon-teal);
        }

        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-teal);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Input Grid */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .table-header {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            padding-bottom: 1rem;
            text-align: left;
        }

        .input-row {
            transition: 0.3s;
        }

        .input-row:hover {
            background: rgba(0, 242, 255, 0.05);
        }

        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.6rem;
            border-radius: 8px;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-teal);
            background: rgba(255,255,255,1);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            color: var(--deep-ocean);
        }

        /* Result Column */
        .result-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .prediction-gauge {
            height: 400px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #three-gauge-container {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid var(--neon-teal);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
            position: relative;
        }

        .gauge-overlay {
            position: absolute;
            z-index: 2;
            text-align: center;
            pointer-events: none;
        }

        .gauge-value {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            text-shadow: 0 0 20px var(--neon-teal);
        }

        .gauge-unit {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--neon-teal);
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 1.2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn-sample {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-predict {
            background: var(--neon-teal);
            color: var(--deep-ocean);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:focus::after {
            width: 300%;
            height: 300%;
            opacity: 0;
        }

        @media (max-width: 1000px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="overlay">
        <nav>
            <div class="logo">WAVELINK 3D</div>
            <button class="sound-toggle" onclick="toggleAudio()" id="audioBtn">🔈 AMBIENT: OFF</button>
        </nav>

        <section class="hero" id="hero">
            <h1>Forecasting Depth</h1>
            <p>ADVANCED CNN-LSTM NEURAL MONITORING SYSTEM</p>
        </section>

        <main class="dashboard-grid">
            <div class="glass-card" id="input-card">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Input Sequence (10 Steps)
                </div>
                <table class="data-table">
                    <thead>
                        <tr class="table-header">
                            <th width="80">Step</th>
                            <th>Height (m)</th>
                            <th>Wind (m/s)</th>
                            <th>Press (hPa)</th>
                            <th>Temp (°C)</th>
                        </tr>
                    </thead>
                    <tbody id="input-grid">
                        <!-- JS generated -->
                    </tbody>
                </table>
                <div class="controls">
                    <button class="btn btn-sample" onclick="fillSampleData()">Sample</button>
                    <button class="btn btn-predict" onclick="makePrediction()">Execute Prediction</button>
                </div>
            </div>

            <div class="result-panel">
                <div class="glass-card" id="result-card" style="height: 100%;">
                    <div class="card-title">Live Forecast Projection</div>
                    <div class="prediction-gauge">
                        <div id="three-gauge-container"></div>
                        <div class="gauge-overlay">
                            <div class="gauge-value" id="prediction-value">--</div>
                            <div class="gauge-unit">Meters</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden Audio -->
    <audio id="oceanSound" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script id="waterVertexShader" type="x-shader/x-vertex">
        uniform float time;
        varying vec2 vUv;
        varying float vElevation;

        void main() {
            vUv = uv;
            vec4 modelPosition = modelMatrix * vec4(position, 1.0);
            
            float elevation = sin(modelPosition.x * 2.0 + time) * 0.15
                            + sin(modelPosition.z * 1.5 + time * 0.8) * 0.15;
            
            modelPosition.y += elevation;
            vElevation = elevation;

            gl_Position = projectionMatrix * viewMatrix * modelPosition;
        }
    </script>

    <script id="waterFragmentShader" type="x-shader/x-fragment">
        uniform vec3 uColor;
        varying float vElevation;
        void main() {
            gl_FragColor = vec4(uColor + vElevation * 0.3, 0.8);
        }
    </script>

    <script>
        // Init Background Three.js
        let scene, camera, renderer, water;
        const clock = new THREE.Clock();

        function initBackground() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 7);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.PlaneGeometry(30, 30, 128, 128);
            const material = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('waterVertexShader').textContent,
                fragmentShader: document.getElementById('waterFragmentShader').textContent,
                uniforms: {
                    time: { value: 0 },
                    uColor: { value: new THREE.Color(0x00a2ff) }
                },
                transparent: true,
                side: THREE.DoubleSide
            });

            water = new THREE.Mesh(geometry, material);
            water.rotation.x = -Math.PI / 2;
            scene.add(water);

            // Foam Particles
            const particlesGeometry = new THREE.BufferGeometry();
            const count = 1500;
            const positions = new Float32Array(count * 3);
            for(let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 30;
            }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particlesMaterial = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.3 });
            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particles);

            animateBackground();
        }

        function animateBackground() {
            requestAnimationFrame(animateBackground);
            const elapsedTime = clock.getElapsedTime();
            water.material.uniforms.time.value = elapsedTime;
            renderer.render(scene, camera);
        }

        // Init Gauge 3D
        let gaugeScene, gaugeCamera, gaugeRenderer, liquid;
        function initGauge() {
            const container = document.getElementById('three-gauge-container');
            gaugeScene = new THREE.Scene();
            gaugeCamera = new THREE.PerspectiveCamera(75, 1, 0.1, 100);
            gaugeCamera.position.z = 5;

            gaugeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            gaugeRenderer.setSize(300, 300);
            container.appendChild(gaugeRenderer.domElement);

            const geo = new THREE.CylinderGeometry(2, 2, 6, 32);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x00f2ff, 
                transparent: true, 
                opacity: 0.7,
                shininess: 100
            });
            liquid = new THREE.Mesh(geo, mat);
            liquid.position.y = -6; // Start empty below view
            gaugeScene.add(liquid);

            const light = new THREE.PointLight(0xffffff, 2);
            light.position.set(2, 5, 5);
            gaugeScene.add(light);
            gaugeScene.add(new THREE.AmbientLight(0x202020));

            animateGauge();
        }

        function animateGauge() {
            requestAnimationFrame(animateGauge);
            liquid.rotation.y += 0.01;
            gaugeRenderer.render(gaugeScene, gaugeCamera);
        }

        function updateGauge(height) {
            // Map height 0-5m to y position -3 to 3 inside the 6-unit cylinder
            const targetY = -3 + (Math.min(height, 5) / 5) * 3;
            gsap.to(liquid.position, { y: targetY, duration: 2.5, ease: "back.out(1.2)" });
        }

        // Generate Inputs
        const grid = document.getElementById('input-grid');
        for (let i = 1; i <= 10; i++) {
            const row = document.createElement('tr');
            row.className = 'input-row';
            row.innerHTML = `
                <td style="color:var(--neon-teal); font-family:'JetBrains Mono'; font-size:0.8rem">T-${11-i}</td>
                <td><input type="number" step="0.1" class="height" placeholder="1.5"></td>
                <td><input type="number" step="0.1" class="wind" placeholder="0.0"></td>
                <td><input type="number" step="0.1" class="pressure" placeholder="1013"></td>
                <td><input type="number" step="0.1" class="temp" placeholder="20.0"></td>
            `;
            grid.appendChild(row);
        }

        // Logic
        async function makePrediction() {
            const heightInputs = document.querySelectorAll('.height');
            const windInputs = document.querySelectorAll('.wind');
            const pressureInputs = document.querySelectorAll('.pressure');
            const tempInputs = document.querySelectorAll('.temp');
            const valueDisplay = document.getElementById('prediction-value');

            const data = [];
            for (let i = 0; i < 10; i++) {
                data.push([
                    parseFloat(heightInputs[i].value) || 0,
                    parseFloat(windInputs[i].value) || 0,
                    parseFloat(pressureInputs[i].value) || 1013,
                    parseFloat(tempInputs[i].value) || 20
                ]);
            }

            valueDisplay.innerText = "...";
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: data })
                });
                
                const result = await response.json();
                if (response.ok) {
                    const height = result.predicted_wave_height_meters;
                    
                    // Animate text count
                    const currentVal = { val: parseFloat(valueDisplay.innerText) || 0 };
                    gsap.to(currentVal, {
                        val: height,
                        duration: 2,
                        onUpdate: () => {
                            valueDisplay.innerText = currentVal.val.toFixed(2);
                        }
                    });
                    
                    updateGauge(height);
                } else {
                    alert("Analysis Error: " + result.detail);
                }
            } catch (error) {
                alert("Core Link Failure");
            }
        }

        function fillSampleData() {
            const sample = [
                [1.58, 6.1, 1014.1, 15.1], [1.58, 6.5, 1014.2, 15.1], [1.58, 6.7, 1014.3, 15.1], 
                [1.58, 6.7, 1014.3, 15.1], [1.58, 6.8, 1014.4, 15.1], [1.56, 6.8, 1014.6, 15.1], 
                [1.55, 6.9, 1014.6, 15.1], [1.54, 6.6, 1014.7, 15.1], [1.52, 7.0, 1014.8, 15.1], 
                [1.51, 7.0, 1014.9, 15.1]
            ];
            const inputs = [
                document.querySelectorAll('.height'), 
                document.querySelectorAll('.wind'), 
                document.querySelectorAll('.pressure'), 
                document.querySelectorAll('.temp')
            ];
            sample.forEach((vals, i) => {
                vals.forEach((v, j) => {
                    inputs[j][i].value = v;
                    gsap.from(inputs[j][i], { background: "rgba(0, 242, 255, 0.3)", duration: 0.5 });
                });
            });
        }

        function toggleAudio() {
            const audio = document.getElementById('oceanSound');
            const btn = document.getElementById('audioBtn');
            if (audio.paused) {
                audio.play();
                btn.innerText = "🔊 AMBIENT: ON";
            } else {
                audio.pause();
                btn.innerText = "🔈 AMBIENT: OFF";
            }
        }

        // Initialize All
        window.addEventListener('DOMContentLoaded', () => {
            initBackground();
            initGauge();
            
            // Initial Animations
            gsap.to('#hero', { opacity: 1, y: 0, duration: 1.5, ease: "power4.out" });
            gsap.from('.glass-card', { 
                opacity: 0, 
                y: 50, 
                duration: 1.2, 
                stagger: 0.3, 
                ease: "power3.out",
                delay: 0.5 
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
